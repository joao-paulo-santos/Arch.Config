[bar.default]
background_opacity = 0.84999998100101948
capsule_thickness = 0.69999998807907104
center = [ "control-center" ]
end = [
    "media",
    "tray",
    "clipboard",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "clock",
    "session"
]
margin_edge = 0
margin_ends = 0
padding = 19
panel_overlap = 0
radius = 0
scale = 1.1500000096857548
shadow = false
widget_spacing = 10

[brightness]
enable_ddcutil = true

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[desktop_widgets]
enabled = true
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
background_opacity = 0.76999998278915882
enabled = true
launcher_position = "start"
pinned = [ "kitty", "github-desktop", "steam", "brave-browser" ]
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 10

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

[location]
address = "Barreiro, Portugal"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-4", "lockscreen-login-box@DP-3" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1317.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-4"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 957.0
    output = "DP-4"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-4".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[shell]
clipboard_enabled = true
screen_time_enabled = true
settings_show_advanced = true

    [shell.panel]
    launcher_categories = false
    launcher_compact = true
    launcher_session_search = true
    launcher_sort_by_usage = false
    open_near_click_wallpaper = true
    transparency_mode = "soft"

    [shell.screenshot]
    pipe_command = "satty -c ~/.config/satty/config.toml -o $HOME/Media/Screenshots/%Y-%m-%d_%H:%M:%S.png -f -"
    pipe_to_command = true
    save_to_file = false

[system.monitor]
cpu_poll_seconds = 30
disk_poll_seconds = 34
gpu_poll_seconds = 30
memory_poll_seconds = 30
network_poll_seconds = 31

[theme]
builtin = "Catppuccin"
community_palette = "Noctalia legacy"

    [theme.templates]
    builtin_ids = [ "hyprland", "kitty" ]
    community_ids = [ "yazi" ]

[wallpaper]
directory = "/home/ecila/.config/hypr/wallpapers/shared"
fill_mode = "stretch"
transition_duration = 800

    [wallpaper.automation]
    enabled = true
    interval_seconds = 120

    [wallpaper.default]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/165090.jpg"

    [wallpaper.last]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/165090.jpg"

    [wallpaper.monitors.DP-3]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/165090.jpg"

    [wallpaper.monitors.DP-4]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/165090.jpg"

[widget.control-center]
glyph = "notebook"

[widget.media]
capsule = true
hide_when_no_media = true
title_scroll = "on_hover"

[widget.workspaces]
display = "name"
minimal = true
occupied_color = "on_surface"
scale = 1.1000000000000001