[audio]
enable_sounds = true

[bar.default]
auto_hide = true
background_opacity = 0.99999997764825821
capsule_thickness = 0.69999998807907104
center = []
contact_shadow = true
end = [ "tray", "notifications", "clipboard", "clock", "session" ]
margin_edge = 0
padding = 12
panel_overlap = 0
radius = 0
radius_bottom_left = 24
radius_bottom_right = 24
reserve_space = false
shadow = true
start = [ "workspace_tray", "launcher" ]
thickness = 35
widget_spacing = 24

[control_center]
sidebar = "full"
sidebar_section = "full"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "notification"

[desktop_widgets]
enabled = true
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001", "desktop-widget-0000000000000002", "desktop-widget-0000000000000003" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 80.0
    box_width = 192.0
    cx = 2256.0
    cy = 120.0
    output = "DP-3"
    rotation = 0.0
    type = "audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        aspect_ratio = 2.5
        background = true
        background_color = "surface_variant"
        background_opacity = 0.90000000000000002
        bands = 32
        centered = true
        color_1 = "secondary"
        color_2 = "error"
        mirrored = true
        show_when_idle = true

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 80.0
    box_width = 160.0
    cx = 2448.0
    cy = 120.0
    output = "DP-3"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        background_color = "surface_variant"
        background_opacity = 0.90000000000000002
        clock_style = "digital"
        color = "on_error"

    [desktop_widgets.widget.desktop-widget-0000000000000003]
    box_height = 160.0
    box_width = 368.0
    cx = 2344.0
    cy = 272.0
    output = "DP-3"
    rotation = 0.0
    type = "media_player"

        [desktop_widgets.widget.desktop-widget-0000000000000003.settings]
        background_color = "surface_variant"
        background_opacity = 0.90000000000000002

[dock]
background_opacity = 0.89999997988343239
enabled = true
icon_size = 70
inactive_opacity = 0.99999997764825821
inactive_scale = 1.0
item_spacing = 12
launcher_icon = "wheat"
launcher_position = "start"
magnification_scale = 1.2000000029802322
main_axis_padding = 12
margin_edge = 0
pinned = [ "github-desktop", "steam", "brave-browser", "vscode", "org.kde.dolphin", "kitty" ]
reserve_space = false
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 10

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

[location]
address = "Barreiro, Portugal"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-4", "lockscreen-login-box@DP-3" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1317.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-4"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 957.0
    output = "DP-4"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-4".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[shell]
app_icon_color = "primary"
clipboard_enabled = true
corner_radius_scale = 1.2500000186264515
polkit_agent = true
settings_show_advanced = true
ui_scale = 1.1499999999999999

    [shell.animation]
    enabled = false

    [shell.panel]
    control_center_placement = "floating"
    launcher_session_search = true
    launcher_sort_by_usage = true
    open_near_click_control_center = true
    open_near_click_session = true
    open_near_click_workspace_tray = true

    [shell.screenshot]
    pipe_command = "satty -c ~/.config/satty/config.toml -o $HOME/Media/Screenshots/%Y-%m-%d_%H:%M:%S.png -f -"
    pipe_to_command = true
    save_to_file = false

    [shell.shadow]
    direction = "down_right"

[system.monitor]
cpu_poll_seconds = 30
disk_poll_seconds = 34
gpu_poll_seconds = 30
memory_poll_seconds = 30
network_poll_seconds = 31

[theme]
community_palette = "Rose Pine Moon"

    [theme.templates]
    builtin_ids = [ "hyprland", "kitty" ]
    community_ids = [ "vscode", "yazi" ]

[wallpaper]
directory = "/home/pat/.config/hypr/wallpapers"
fill_mode = "stretch"
transition_duration = 800

    [wallpaper.automation]
    enabled = false
    interval_seconds = 120

    [wallpaper.default]
    path = "/home/pat/.config/hypr/wallpapers/shared/thumb-1920-984422.jpg"

    [wallpaper.last]
    path = "/home/pat/.config/hypr/wallpapers/shared/thumb-1920-984422.jpg"

    [wallpaper.monitors.DP-3]
    path = "/home/pat/.config/hypr/wallpapers/shared/thumb-1920-984422.jpg"

    [wallpaper.monitors.DP-4]
    path = "/home/pat/.config/hypr/wallpapers/shared/thumb-1920-984422.jpg"

[widget.control-center]
glyph = "notebook"

[widget.taskbar]
focused_only = true
group_by_workspace = true
inactive_opacity = 0.85999999999999999
minimal = true
occupied_color = "on_surface"
scale = 1.4000000000000001
window_title_max_width = 65.0
workspace_label_placement = "inside"

[widget.workspace_tray]
display = "name"
focused_only = true
hide_when_empty = true
new_workspace_command = "hyprctl eval 'local ws=hl.get_workspaces() local u={} for _,w in ipairs(ws) do u[w.id]=true end local n=1 while u[n] do n=n+1 end hl.dispatch(hl.dsp.focus{workspace=n})'"
occupied_color = "on_surface"
scale = 1.1000000000000001
show_new_workspace = true

[widget.workspaces]
focused_only = true
max_label_chars = 3
occupied_color = "on_surface"
scale = 1.1000000000000001