[bar.default]
background_opacity = 0.88999998010694981
capsule_thickness = 0.69999998807907104
center = []
end = [ "notifications", "clipboard", "network", "volume", "battery", "clock", "session" ]
margin_edge = 0
margin_ends = 0
padding = 19
panel_overlap = 0
radius = 0
scale = 1.1500000096857548
shadow = false
start = [ "Velo", "taskbar" ]
thickness = 40
widget_spacing = 10

[brightness]
enable_ddcutil = true

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[desktop_widgets]
enabled = false

[dock]
background_opacity = 0.76999998278915882
enabled = true
icon_size = 49
launcher_position = "start"
main_axis_padding = 10
pinned = [ "kitty", "github-desktop", "steam", "brave-browser", "discord" ]
radius = 10
reserve_space = false
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 10

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

[location]
address = "Barreiro, Portugal"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-4", "lockscreen-login-box@DP-3" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1317.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-4"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 957.0
    output = "DP-4"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-4".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[shell]
polkit_agent = true
settings_show_advanced = true

    [shell.panel]
    launcher_categories = false
    launcher_compact = true
    launcher_session_search = true
    launcher_sort_by_usage = false
    open_near_click_control_center = true
    open_near_click_wallpaper = true
    open_near_click_workspace_tray = true
    transparency_mode = "soft"

    [shell.screenshot]
    pipe_command = "satty -c ~/.config/satty/config.toml -o $HOME/Media/Screenshots/%Y-%m-%d_%H:%M:%S.png -f -"
    pipe_to_command = true
    save_to_file = false

[system.monitor]
cpu_poll_seconds = 30
disk_poll_seconds = 34
gpu_poll_seconds = 30
memory_poll_seconds = 30
network_poll_seconds = 31

[theme]
builtin = "Catppuccin"
mode = "dark"
source = "community"

    [theme.templates]
    builtin_ids = [ "hyprland", "kitty", "velo" ]
    community_ids = [ "yazi" ]

[wallpaper]
directory = "/home/ecila/.config/hypr/wallpapers/shared"
fill_mode = "stretch"
transition_duration = 800

    [wallpaper.automation]
    enabled = true
    interval_seconds = 120

    [wallpaper.default]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/344628.jpg"

    [wallpaper.last]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/344628.jpg"

    [wallpaper.monitors.DP-3]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/344628.jpg"

    [wallpaper.monitors.DP-4]
    path = "/home/ecila/.config/hypr/wallpapers/shared/anime/steins;gate/344628.jpg"

[widget.Velo]
command = "velo -e drun"
glyph = "search"
right_command = "velo"
type = "custom_button"

[widget.control-center]
glyph = "notebook"

[widget.network]
show_label = false

[widget.notifications]
hide_when_no_unread = true

[widget.taskbar]
focused_only = true
group_by_workspace = true
inactive_opacity = 0.85999999999999999
minimal = true
occupied_color = "on_surface"
scale = 1.4000000000000001
window_title_max_width = 65.0
workspace_label_placement = "inside"

[widget.workspace_tray]
display = "name"
focused_only = true
hide_when_empty = true
new_workspace_command = "hyprctl eval 'local ws=hl.get_workspaces() local u={} for _,w in ipairs(ws) do u[w.id]=true end local n=1 while u[n] do n=n+1 end hl.dispatch(hl.dsp.focus{workspace=n})'"
occupied_color = "on_surface"
scale = 1.1000000000000001
show_new_workspace = true

[widget.workspaces]
focused_only = true
max_label_chars = 3
occupied_color = "on_surface"
scale = 1.1000000000000001